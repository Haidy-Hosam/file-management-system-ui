<aside class="sidebar bg-dark text-white d-flex flex-column">
  <div class="sidebar-header border-bottom border-secondary px-4 py-4">
    <div class="d-flex align-items-center gap-3">
      <div class="sidebar-brand-mark">A</div>
      <div>
        <div class="text-uppercase text-secondary small">ADIB</div>
        <div class="fw-semibold">File Management</div>
      </div>
    </div>
  </div>

  <nav class="nav nav-pills flex-column px-3 py-4 gap-2 flex-grow-1">

    @if (!isLoading()) {
      @for (page of pages(); track page.route) {
        <a class="nav-link" [routerLink]="page.route"  routerLinkActive="active">
          {{ page.name }}
        </a>
      }
    } @else {
      <span class="text-secondary small px-2">Loading menu...</span>
    }

  </nav>

  <div class="px-3 pb-4 pt-2 border-top border-secondary">
    <button type="button" class="btn btn-outline-light w-100" (click)="logout()">Logout</button>
  </div>
</aside>
