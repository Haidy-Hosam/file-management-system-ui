<div class="departments-page p-4">
  <!-- Header / Action Bar -->
  <div class="action-bar d-flex justify-content-between align-items-center mb-4 gap-3 p-3 shadow-sm">
    <div class="search-container flex-grow-1 position-relative">
      <svg class="search-icon position-absolute text-muted" style="left: 1rem; top: 50%; transform: translateY(-50%);" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" class="form-control form-control-lg search-input border-0 ps-5" placeholder="Search departments...">
    </div>

    <button class="btn btn-primary btn-lg d-flex align-items-center gap-2 px-4 rounded-3 text-nowrap" style="font-size: 0.95rem; font-weight: 500;">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      New Department
    </button>
  </div>

  <!-- Cards Grid -->
  <div class="row g-4">
    @for (dept of departments; track dept.id) {
      <div class="col-12 col-md-6 col-xl-4">
        <app-department-card [department]="dept"></app-department-card>
      </div>
    }
  </div>
</div>
