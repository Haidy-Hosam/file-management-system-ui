<header class="topbar">
  <div class="topbar-inner">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.6"/>
        <path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <input
       type="search"
       placeholder="Search files, users, departments..."
       [(ngModel)]="searchTerm"
       (keyup.enter)="onSearchSubmit()"
        name="search"
      />
      <kbd class="search-kbd">⌘K</kbd>
    </div>

    <div class="topbar-actions">
      <button class="icon-btn" title="Notifications">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"
                stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span class="notif-dot"></span>
      </button>

      <div class="user-menu-wrap">
        <button class="user-trigger" (click)="toggleUserMenu($event)">
          <div class="user-avatar">{{ userInitials }}</div>
          <div class="user-text">
            <span class="user-name">{{ userEmail }}</span>
            <span class="user-role">{{ userRole }}</span>
          </div>
          <svg class="chevron" [class.open]="showUserMenu" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="user-dropdown" *ngIf="showUserMenu" (click)="$event.stopPropagation()">
          <div class="dropdown-header">
            <div class="user-avatar">{{ userInitials }}</div>
            <div>
              <div class="dropdown-name">{{ userEmail }}</div>
              <div class="dropdown-role">{{ userRole }}</div>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item" routerLink="/profile">
            <svg viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            My Profile
          </a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" (click)="logout()">
            <svg viewBox="0 0 24 24" fill="none"><path d="M16 17l5-5-5-5M21 12H9M12 3H6a2 2 0 00-2 2v14a2 2 0 002 2h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Sign out
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
