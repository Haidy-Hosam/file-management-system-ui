<aside class="sidebar d-flex flex-column">

  <div class="sidebar-header d-flex align-items-center gap-3">
    <div class="sidebar-brand-mark">
      <img src="https://s3-symbol-logo.tradingview.com/abu-dhabi-islamic-bank--big.svg" alt="ADIB logo" class="brand-logo-img" />
    </div>
    <div>
      <div class="brand-name">ADIB</div>
      <div class="text-enterprise">Archiving System</div>
    </div>
  </div>

 <nav class="nav flex-column px-3 pt-4">
    <div class="nav-label text-uppercase">Navigation</div>

    @if (!isLoading()) {
      @for (page of visiblePages(); track page.route) {
        <a class="nav-link" [routerLink]="page.route" routerLinkActive="active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               [innerHTML]="getIconInner(page.route)"></svg>
          <span>{{ page.name }}</span>
        </a>
      }
    } @else {
      <span class="text-secondary small px-2">Loading menu...</span>
    }
  </nav>

  <div class="user-section">
      <a routerLink="/profile" class="user-card">
    <div class="user-avatar">{{ userInitials }}</div>
    <div>
      <div class="user-name">{{ userEmail }}</div>
      <div class="user-role">{{ userRole }}</div>
    </div>
  </a>


    <button type="button" class="btn-logout" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span>Sign Out</span>
    </button>
  </div>

</aside>
