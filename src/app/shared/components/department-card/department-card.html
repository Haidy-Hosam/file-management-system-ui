<div class="card department-card border-0 shadow-sm" [ngStyle]="{'border-top': '4px solid ' + department.themeColor}">
  <div class="card-body p-4">
    <!-- Header: Icon & Title -->
    <div class="d-flex align-items-center mb-4 gap-3">
      <div class="dept-icon-wrapper rounded-3 d-flex align-items-center justify-content-center bg-light text-primary">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
          <path d="M9 22v-4h6v4"></path>
          <path d="M8 6h.01"></path>
          <path d="M16 6h.01"></path>
          <path d="M12 6h.01"></path>
          <path d="M12 10h.01"></path>
          <path d="M12 14h.01"></path>
          <path d="M16 10h.01"></path>
          <path d="M16 14h.01"></path>
          <path d="M8 10h.01"></path>
          <path d="M8 14h.01"></path>
        </svg>
      </div>
      <div>
        <h5 class="card-title fw-bold mb-1 fs-6 text-dark">{{ department.name }}</h5>
        <div class="text-secondary small">Head: {{ department.head }}</div>
      </div>
    </div>

    <!-- Statistics -->
    <div class="stats-container bg-light rounded-3 p-3 mb-4 d-flex justify-content-between text-center">
      <div class="stat-item flex-fill">
        <div class="fw-bold text-dark fs-6">{{ department.members }}</div>
        <div class="text-secondary" style="font-size: 0.75rem;">Members</div>
      </div>
      <div class="stat-divider border-end border-secondary border-opacity-25 mx-2"></div>
      <div class="stat-item flex-fill">
        <div class="fw-bold text-dark fs-6">{{ department.files | number }}</div>
        <div class="text-secondary" style="font-size: 0.75rem;">Files</div>
      </div>
      <div class="stat-divider border-end border-secondary border-opacity-25 mx-2"></div>
      <div class="stat-item flex-fill">
        <div class="fw-bold text-dark fs-6">{{ department.storage }}</div>
        <div class="text-secondary" style="font-size: 0.75rem;">Storage</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="d-flex justify-content-between align-items-center">
      <div class="status-badge d-flex align-items-center gap-2 px-3 py-1 rounded-pill" 
           [class.status-active]="department.status === 'Active'"
           [class.status-inactive]="department.status === 'Inactive'">
        <span class="status-dot rounded-circle"></span>
        <span class="fw-semibold" style="font-size: 0.8rem;">{{ department.status }}</span>
      </div>
      <a href="javascript:void(0)" class="text-primary text-decoration-none fw-medium" style="font-size: 0.85rem;">
        View <i class="bi bi-chevron-right ms-1"></i>
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="ms-1">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>
    </div>
  </div>
</div>
