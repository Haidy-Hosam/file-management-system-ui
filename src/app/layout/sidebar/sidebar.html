<aside class="sidebar d-flex flex-column">
  <!-- Header / Brand -->
  <div class="sidebar-header px-4 py-4">
    <div class="d-flex align-items-center gap-3">
      <div class="sidebar-brand-mark">
        <svg
          viewBox="0 0 24 24"
          width="22"
          height="22"
          stroke="currentColor"
          stroke-width="1.5"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <circle cx="10" cy="13" r="1.5"></circle>
          <circle cx="14" cy="17" r="1.5"></circle>
          <path d="M10 14.5L14 15.5"></path>
        </svg>
      </div>
      <div>
        <div class="fw-bold text-white fs-5 lh-1">Archive</div>
        <div class="text-enterprise mt-1">Enterprise</div>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav-section px-3 flex-grow-1">
    <div class="nav-label px-3 mb-2">NAVIGATION</div>
    <nav class="nav nav-pills flex-column gap-1">
      @if (!isLoading()) {
        @for (page of pages(); track page.route) {
          <a class="nav-link" [routerLink]="page.route" routerLinkActive="active">
            <svg
              class="nav-icon me-3"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              @switch (page.name.toLowerCase()) {
                @case ('dashboard') {
                  <rect x="3" y="3" width="7" height="7"></rect>
                  <rect x="14" y="3" width="7" height="7"></rect>
                  <rect x="14" y="14" width="7" height="7"></rect>
                  <rect x="3" y="14" width="7" height="7"></rect>
                }
                @case ('files') {
                  <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                  <polyline points="13 2 13 9 20 9"></polyline>
                }
                @case ('users') {
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                }
                @case ('roles') {
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                  <path d="m9 12 2 2 4-4"></path>
                }
                @case ('departments') {
                  <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                  <path d="M9 22v-4h6v4"></path>
                  <path d="M8 6h.01"></path>
                  <path d="M16 6h.01"></path>
                  <path d="M12 6h.01"></path>
                  <path d="M12 10h.01"></path>
                  <path d="M12 14h.01"></path>
                  <path d="M16 10h.01"></path>
                  <path d="M16 14h.01"></path>
                  <path d="M8 10h.01"></path>
                  <path d="M8 14h.01"></path>
                }
                @default {
                  <circle cx="12" cy="12" r="10"></circle>
                }
              }
            </svg>
            {{ page.name }}
          </a>
        }
      } @else {
        <span class="text-muted small px-3">Loading menu...</span>
      }
    </nav>
  </div>

  <!-- User Profile Section -->
  <div class="user-section px-3 pb-4">
    <div class="user-card d-flex align-items-center gap-3 p-3 mb-3">
      <div class="user-avatar">SC</div>
      <div>
        {{ currentUser()?.name }}
          <br>
        {{ currentUser()?.role }}
        
        
      </div>
    </div>

    <button
      type="button"
      class="btn-logout d-flex align-items-center gap-3 px-3 w-100"
      (click)="logout()"
    >
      <svg
        class="logout-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span>Sign Out</span>
    </button>
  </div>
</aside>
